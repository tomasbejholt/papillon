services:
  - type: web
    name: papillon-api
    runtime: python
    rootDir: assignments/assignment_3/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
